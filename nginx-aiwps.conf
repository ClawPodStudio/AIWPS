server {
    listen 80;
    server_name _;

    location /aiwps {
        alias /home/openclaw/ClawTeam-OpenClaw/projects/AIWPS/vue-project/dist;
        index index.html;
        try_files $uri $uri/ /aiwps/index.html;
    }

    location /aiwps/api/ {
        proxy_pass http://localhost:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
